name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rag-service:
    name: Test RAG Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-service
    env:
      # Mock API keys — config.Settings requires them at import; real keys never in CI
      VOYAGE_API_KEY: test-key
      ANTHROPIC_API_KEY: test-key
      PINECONE_API_KEY: test-key
      PINECONE_INDEX: test-index

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: rag-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Run tests
        run: pytest -v --tb=short

      - name: Matrix-strip leakage guard
        run: pytest tests/test_isq_prompts_no_matrix_leakage.py -v
